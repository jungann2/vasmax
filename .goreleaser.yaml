project_name: VasmaX
builds:
  - id: VasmaX
    binary: VasmaX
    main: ./cmd/VasmaX
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - id: VasmaX
    builds:
      - VasmaX
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
checksum:
  name_template: "checksums.txt"
  algorithm: sha256
